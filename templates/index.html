<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database AI Chat</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            /* Premium dark mesh gradient background */
            background-color: #050505;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.2) 0, transparent 50%);
            background-attachment: fixed;
            color: #f8fafc;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Glassmorphism Container */
        .chat-container {
            width: 100%;
            height: 100vh;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .chat-header {
            padding: 1.25rem;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .messages-area {
            flex-grow: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        /* Elegant thin scrollbar */
        .messages-area::-webkit-scrollbar {
            width: 6px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .messages-area::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .input-area {
            padding: 1.5rem;
            background: rgba(15, 23, 42, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .message-bubble {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 1.25rem;
            line-height: 1.5;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .msg-user {
            /* Glassy Blue Gradient */
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.6), rgba(37, 99, 235, 0.6));
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0.25rem;
            border: 1px solid rgba(96, 165, 250, 0.3);
        }

        .msg-bot {
            /* Glassy Dark */
            background: rgba(255, 255, 255, 0.05);
            color: #f1f5f9;
            align-self: flex-start;
            border-bottom-left-radius: 0.25rem;
        }

        .prose-invert pre {
            background-color: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Glassy Input */
        #chatInput {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            transition: all 0.3s ease;
        }
        #chatInput:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(96, 165, 250, 0.5);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        
        /* Glassy Button */
        #sendBtn {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.8), rgba(139, 92, 246, 0.8));
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
        }
        #sendBtn:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, rgba(59, 130, 246, 1), rgba(139, 92, 246, 1));
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center backdrop-blur-sm shrink-0">
                <i class="fa-solid fa-robot text-white text-lg"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold text-white leading-tight">AI Assistant</h1>
                <p class="text-blue-100 text-xs flex items-center gap-1.5 opacity-90 mt-0.5">
                    <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span> Online
                </p>
            </div>
        </div>

        <div id="chatBox" class="messages-area">
            <div class="flex items-start gap-3">
                <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 shadow-lg border border-white/10" style="background: rgba(255,255,255,0.08); backdrop-filter: blur(5px);">
                    <i class="fa-solid fa-robot text-blue-300"></i>
                </div>
                <div class="message-bubble msg-bot shadow-lg">
                    <div class="text-sm prose prose-sm prose-invert max-w-none">
                        Hello! I am here to help. How can I assist you today?
                    </div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <form id="chatForm" class="relative flex items-center">
                <input type="text" id="chatInput" autocomplete="off" placeholder="Type your message..." 
                    class="w-full rounded-xl pl-5 pr-14 py-4 placeholder-white/50 outline-none shadow-inner">
                <button type="submit" id="sendBtn" class="absolute right-3 w-10 h-10 rounded-lg text-white flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        const chatForm = document.getElementById('chatForm');
        const chatInput = document.getElementById('chatInput');
        const chatBox = document.getElementById('chatBox');
        let messageHistory = [];

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const content = chatInput.value.trim();
            if (!content) return;

            // Add user message
            appendMessage('user', content);
            chatInput.value = '';
            
            // Prepare payload
            const payload = {
                message: content,
                history: messageHistory
            };
            
            // Update history
            messageHistory.push({ role: "user", content: content });

            // Add bot placeholder
            const botMessageEl = appendMessage('bot', '', true);
            let botReply = "";

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // Remove typing indicator and add actual text bubble
                const typingInd = document.getElementById('typingIndicator');
                if(typingInd) typingInd.remove();
                
                if (!response.ok) {
                    const errorEl = appendMessage('bot', '');
                    errorEl.innerHTML = `<span class="text-red-400">Error: Unable to reach AI server.</span>`;
                    return;
                }

                // Append empty bot message and get content area
                const actualBotMessageEl = appendMessage('bot', '');

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    buffer += chunk;
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (let line of lines) {
                        line = line.trim();
                        if (!line || !line.startsWith('data:')) continue;
                        
                        const dataStr = line.substring(5).trim();
                        if (dataStr === '[DONE]') continue;

                        try {
                            const data = JSON.parse(dataStr);
                            if (data.choices && data.choices.length > 0 && data.choices[0].delta) {
                                const textChunk = data.choices[0].delta.content || "";
                                if (textChunk) {
                                    botReply += textChunk;
                                    actualBotMessageEl.innerHTML = marked.parse(botReply);
                                    chatBox.scrollTop = chatBox.scrollHeight;
                                }
                            }
                        } catch (err) {}
                    }
                }
                
                // Process remaining buffer
                if (buffer.trim() && buffer.trim().startsWith('data:')) {
                    const dataStr = buffer.trim().substring(5).trim();
                    if (dataStr !== '[DONE]') {
                        try {
                            const data = JSON.parse(dataStr);
                            if (data.choices && data.choices[0].delta.content) {
                                botReply += data.choices[0].delta.content;
                                actualBotMessageEl.innerHTML = marked.parse(botReply);
                                chatBox.scrollTop = chatBox.scrollHeight;
                            }
                        } catch(e) {}
                    }
                }

                messageHistory.push({ role: "assistant", content: botReply });

            } catch (error) {
                const typingInd = document.getElementById('typingIndicator');
                if(typingInd) typingInd.remove();
                botMessageEl.innerHTML = `<span class="text-red-400">Network Error.</span>`;
            }
        });

        function appendMessage(sender, text, isTyping = false) {
            const div = document.createElement('div');
            div.className = `flex items-start gap-3 ${sender === 'user' ? 'flex-row-reverse' : ''}`;
            
            const avatar = sender === 'user' 
                ? `<div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 shadow-lg border border-white/20" style="background: linear-gradient(135deg, rgba(59, 130, 246, 0.8), rgba(139, 92, 246, 0.8)); backdrop-filter: blur(5px);"><i class="fa-solid fa-user text-white"></i></div>`
                : `<div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 shadow-lg border border-white/10" style="background: rgba(255,255,255,0.08); backdrop-filter: blur(5px);"><i class="fa-solid fa-robot text-blue-300"></i></div>`;
            
            const bubbleClass = sender === 'user' ? 'msg-user shadow-md' : 'msg-bot shadow-lg';

            if (isTyping) {
                div.id = 'typingIndicator';
                div.innerHTML = `
                    ${avatar}
                    <div class="message-bubble ${bubbleClass} flex items-center gap-1.5 h-[50px]">
                        <div class="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0s"></div>
                        <div class="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0.15s"></div>
                        <div class="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0.3s"></div>
                    </div>
                `;
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;
                return div;
            } else {
                div.innerHTML = `
                    ${avatar}
                    <div class="message-bubble ${bubbleClass}">
                        <div class="text-sm prose prose-sm ${sender === 'bot' ? 'prose-invert' : ''} max-w-none content-area"></div>
                    </div>
                `;
                const contentArea = div.querySelector('.content-area');
                if (sender === 'user') {
                    contentArea.textContent = text;
                } else {
                    contentArea.innerHTML = text ? marked.parse(text) : '';
                }
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;
                return contentArea;
            }
        }
    </script>
</body>
</html>
